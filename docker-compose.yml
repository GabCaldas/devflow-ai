services:
  api:
    image: devflow-ai:local
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    ports:
      - "${DEVFLOW_PORT:-8123}:8000"
    env_file:
      - .env
    environment:
      CODEBASE_PATH: /workspace
      RAG_ENABLED: "${RAG_ENABLED:-true}"
      RAG_TOP_K: "${RAG_TOP_K:-5}"
      RAG_MAX_FILES: "${RAG_MAX_FILES:-1500}"
      RAG_MAX_CONTEXT_CHARS: "${RAG_MAX_CONTEXT_CHARS:-7000}"
    volumes:
      - type: bind
        source: ${CODEBASE_PATH_HOST:-.}
        target: /workspace
        read_only: true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    stop_grace_period: 15s
